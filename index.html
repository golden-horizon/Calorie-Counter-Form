<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="styles.css" />
    <title>Calorie Counter</title>
  </head>
  <body>
    <main>
      <!-- Main heading for the app -->
      <h1>Calorie Counter</h1>

      <!-- Container for the entire form and output -->
      <div class="container">
        <!-- Form for calorie input and calculation -->
        <form id="calorie-counter">
          
          <!-- Daily calorie budget input -->
          <label for="budget">Budget</label>
          <input
            type="number"
            min="0"
            id="budget"
            placeholder="Daily calorie budget"
            required
          />

          <!-- Fieldsets for different meal/exercise categories -->
          <fieldset id="breakfast">
            <legend>Breakfast</legend>
            <div class="input-container"></div> <!-- Dynamic entries go here -->
          </fieldset>

          <fieldset id="lunch">
            <legend>Lunch</legend>
            <div class="input-container"></div>
          </fieldset>

          <fieldset id="dinner">
            <legend>Dinner</legend>
            <div class="input-container"></div>
          </fieldset>

          <fieldset id="snacks">
            <legend>Snacks</legend>
            <div class="input-container"></div>
          </fieldset>

          <fieldset id="exercise">
            <legend>Exercise</legend>
            <div class="input-container"></div>
          </fieldset>

          <!-- Controls for adding entries -->
          <div class="controls">
            <span>
              <label for="entry-dropdown">Add food or exercise:</label>
              <select id="entry-dropdown" name="options">
                <!-- Options correspond to each fieldset -->
                <option value="breakfast" selected>Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="snacks">Snacks</option>
                <option value="exercise">Exercise</option>
              </select>
              <button type="button" id="add-entry">Add Entry</button>
            </span>
          </div>

          <!-- Buttons to calculate or clear -->
          <div>
            <button type="submit">Calculate Remaining Calories</button>
            <button type="button" id="clear">Clear</button>
          </div>
        </form>

        <!-- Output container for results -->
        <div id="output" class="output hide"></div>
      </div>
    </main>

    <!-- Link to external JS -->
    <script src="./script.js"></script>
  </body>
</html>
